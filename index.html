<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de Garaje AVCCI</title>
    <style>
        /* Estilos base */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        
        .cta-section { text-align: center; margin: 30px 0; border-top: 1px solid #eee; padding-top: 20px; }
        .btn { padding: 12px 25px; margin: 10px; font-size: 16px; cursor: pointer; border: none; border-radius: 25px; background-color: #3498db; color: white; transition: 0.3s; }
        .btn:hover { background-color: #2980b9; }

        /* Contenedor de productos (Aquí ocurre la magia) */
        #contenedor-ropa { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 40px 0; max-width: 1000px; margin: 0 auto; }

        /* Estilo de Tarjetas */
        .tarjeta-ropa { background: white; border-radius: 12px; padding: 20px; width: 250px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; }
        .tarjeta-ropa img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .tarjeta-ropa a { margin-top: auto; background: #25D366; color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Venta de Garage AVCCI 🎗️</h1>
    <p style="text-align: center;">Hemos unido fuerzas con nuestra comunidad para organizar una Venta de Garaje Solidaria. Cada artículo que ves aquí fue donado por voluntarios; al adquirirlo, el 100% de tu compra se destina al apoyo integral de niños con cáncer y sus familias.</p>

    <div class="cta-section">
        <button id="boton-ropa" class="btn">👕 Ropa y Calzado</button>
        <button id="boton-variados" class="btn">📦 Artículos Variados</button>
    </div>
</div>

<div id="contenedor-ropa"></div>

<script src="app.js"></script>
</body>
</html>
